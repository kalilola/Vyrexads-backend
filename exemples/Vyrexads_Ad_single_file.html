<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyrexads — Motion Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
    #root { position: absolute; inset: 0; }
    :root { font-synthesis: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Inlined from animations.jsx -->
  <script type="text/babel" data-presets="env,react">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Exports (to window): Stage, Sprite, PlaybackBar, TextSprite, ImageSprite, RectSprite,
//   useTime, useTimeline, useSprite, Easing, interpolate, animate, clamp.
//
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// <Stage> auto-scales to the viewport and provides the scrubber, play/pause,
// ←/→ seek, space, and 0-to-reset controls, and persists the playhead.
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook. Use Easing + interpolate()/animate()
// for tweens; TextSprite / ImageSprite / RectSprite have built-in entry/exit.
// Build YOUR scenes by composing Sprites inside a Stage.
/* END USAGE */
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',

      <path d="M19 2l.9 2.4L22.3 5.3l-2.4.9L19 8.6l-.9-2.4-2.4-.9 2.4-.9z" fill={color} opacity="0.7" />

// fake cursor

    <div style={{ position: 'absolute', left: x, top: y, transform: 'translate(-2px,-2px)', zIndex: 50, pointerEvents: 'none' }}>

        <path d="M5 3l14 7-6 1.6L9.6 18z" fill="#fff" stroke="#111" strokeWidth="1.4" strokeLinejoin="round" />
      </svg>

        <div style={{ position: 'absolute', left: 22, top: 16, background: '#111', color: '#fff', fontFamily: FONT,
          fontSize: 11, fontWeight: 600, padding: '3px 8px', borderRadius: 6, whiteSpace: 'nowrap' }}>{label}</div>
      )}
    </div>

// ── shared motion helpers ───────────────────────────────────────────────────
// standard scene cut-in / cut-out (fast fade + micro scale). Returns style props.
function shellAnim(localTime, duration, { inDur = 0.4, outDur = 0.32, fromScale = 1.05, rise = 22 } = {}) {
  const outStart = Math.max(0, duration - outDur);
  let opacity = 1, scale = 1, ty = 0;
  if (localTime < inDur) {
    const t = Easing.easeOutCubic(clamp(localTime / inDur, 0, 1));
    opacity = t; scale = fromScale - (fromScale - 1) * t; ty = (1 - t) * rise;
  } else if (localTime > outStart) {
    const t = Easing.easeInCubic(clamp((localTime - outStart) / outDur, 0, 1));
    opacity = 1 - t; scale = 1 - 0.04 * t; ty = -t * 14;
  }
  return { opacity, transform: `scale(${scale}) translateY(${ty}px)` };
}

// hex color lerp
function lerpHex(a, b, t) {
  const pa = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
  const pb = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
  const c = pa.map((v, i) => Math.round(v + (pb[i] - v) * clamp(t, 0, 1)));
  return '#' + c.map(v => v.toString(16).padStart(2, '0')).join('');
}

// piecewise color picker across [ {t, a, b} ] anchors
function colorPhase(time, stops) {
  for (let i = 0; i < stops.length - 1; i++) {
    if (time >= stops[i].t && time <= stops[i + 1].t) {
      const f = (time - stops[i].t) / (stops[i + 1].t - stops[i].t || 1);
      const e = Easing.easeInOutCubic(f);
      return { a: lerpHex(stops[i].a, stops[i + 1].a, e), b: lerpHex(stops[i].b, stops[i + 1].b, e) };
    }
  }
  const last = stops[stops.length - 1];
  return { a: last.a, b: last.b };
}

// typed-text: returns substring of `text` based on progress + a blinking caret flag
function typed(text, localTime, { start = 0, cps = 26 } = {}) {
  const n = clamp(Math.floor((localTime - start) * cps), 0, text.length);
  const done = n >= text.length;
  const caret = !done || (Math.floor(localTime * 2) % 2 === 0);
  return { str: text.slice(0, n), done, caret };
}

Object.assign(window, {

  BrandMark, Wordmark, Lockup, GlowBg, Panel, PlatformDot, ContentCard, Pill, Kicker, Sparkle, Cursor,

});

  <script type="text/babel" data-presets="env,react">
// charts.jsx — animated data viz for the Vyrexads ad. Loaded after ui.jsx.

// format a number with thousands separators + optional decimals
function fmtNum(n, decimals = 0) {
  const fixed = Number(n).toFixed(decimals);
  const [int, dec] = fixed.split('.');
  const withSep = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return dec != null ? `${withSep}.${dec}` : withSep;
}

// ── Count-up number ─────────────────────────────────────────────────────────
function CountUp({ to, progress, decimals = 0, prefix = '', suffix = '',
  size = 40, weight = 800, color = V.ink2, style = {} }) {
  const e = Easing.easeOutCubic(clamp(progress, 0, 1));
  const val = to * e;
  return (
    <span style={{ fontFamily: FONT, fontWeight: weight, fontSize: size, color,
      letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums', ...style }}>
      {prefix}{fmtNum(val, decimals)}{suffix}
    </span>
  );
}

// helper: build smooth-ish path + sample head position
function buildPath(pts, w, h, pad = 0) {
  const xs = pts.map((p, i) => pad + (i / (pts.length - 1)) * (w - pad * 2));
  const min = Math.min(...pts), max = Math.max(...pts);
  const ys = pts.map(v => h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2));
  let d = `M ${xs[0]} ${ys[0]}`;
  for (let i = 1; i < pts.length; i++) {
    const cx = (xs[i - 1] + xs[i]) / 2;
    d += ` C ${cx} ${ys[i - 1]} ${cx} ${ys[i]} ${xs[i]} ${ys[i]}`;
  }
  return { d, xs, ys };
}

// ── Self-drawing line chart with area fill + head dot ───────────────────────
function LineChart({ progress, w = 520, h = 220, pts, color = V.green, pad = 14,
  showDot = true, showArea = true, strokeW = 3 }) {
  const data = pts || [22, 30, 26, 38, 34, 50, 46, 62, 58, 78, 88];
  const { d, xs, ys } = buildPath(data, w, h, pad);
  const p = clamp(progress, 0, 1);
  // head dot position by sampling segment lengths
  const segLen = [];
  let total = 0;
  for (let i = 1; i < xs.length; i++) {
    const l = Math.hypot(xs[i] - xs[i - 1], ys[i] - ys[i - 1]); segLen.push(l); total += l;
  }
  let target = total * p, acc = 0, hx = xs[0], hy = ys[0];
  for (let i = 0; i < segLen.length; i++) {
    if (acc + segLen[i] >= target) {
      const f = (target - acc) / (segLen[i] || 1);
      hx = xs[i] + (xs[i + 1] - xs[i]) * f; hy = ys[i] + (ys[i + 1] - ys[i]) * f; break;
    }
    acc += segLen[i]; hx = xs[i + 1]; hy = ys[i + 1];
  }
  const areaD = `${d} L ${xs[xs.length - 1]} ${h - pad} L ${xs[0]} ${h - pad} Z`;
  const gid = 'lcg' + Math.round(w + h + data[0]);
  return (
    <svg width={w} height={h} style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={color} stopOpacity="0.22" />
          <stop offset="1" stopColor={color} stopOpacity="0" />
        </linearGradient>
        <clipPath id={gid + 'clip'}><rect x="0" y="0" width={pad + p * (w - pad * 2)} height={h} /></clipPath>
      </defs>
      {/* baseline */}
      <line x1={pad} y1={h - pad} x2={w - pad} y2={h - pad} stroke={V.borderSoft} strokeWidth="1" />
      {showArea && <path d={areaD} fill={`url(#${gid})`} clipPath={`url(#${gid}clip)`} />}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round"
        pathLength="1" strokeDasharray="1" strokeDashoffset={1 - p} />
      {showDot && p > 0.02 && (
        <>
          <circle cx={hx} cy={hy} r="9" fill={color} opacity="0.18" />
          <circle cx={hx} cy={hy} r="4.5" fill={color} stroke="#fff" strokeWidth="2" />
        </>
      )}
    </svg>
  );
}

// ── Growing bars ────────────────────────────────────────────────────────────
function Bars({ progress, w = 260, h = 150, data, color = V.blue, gap = 10, pad = 8 }) {
  const vals = data || [40, 62, 48, 78, 70, 96, 88];
  const max = Math.max(...vals);
  const bw = (w - pad * 2 - gap * (vals.length - 1)) / vals.length;
  const p = clamp(progress, 0, 1);
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      {vals.map((v, i) => {
        // stagger each bar's growth
        const local = clamp((p - i * 0.05) / (1 - vals.length * 0.04), 0, 1);
        const bh = (v / max) * (h - pad * 2) * Easing.easeOutCubic(local);
        const x = pad + i * (bw + gap);
        const last = i === vals.length - 1;
        return (
          <rect key={i} x={x} y={h - pad - bh} width={bw} height={bh} rx="4"
            fill={last ? color : V.faint2} opacity={last ? 1 : 0.55} />
        );
      })}
    </svg>
  );
}

// ── KPI stat block ──────────────────────────────────────────────────────────
function KPIStat({ label, to, progress, decimals = 0, prefix = '', suffix = '',
  delta = null, color = V.ink2, w = 'auto' }) {
  return (
    <div style={{ fontFamily: FONT, width: w }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: V.faint }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 6 }}>
        <CountUp to={to} progress={progress} decimals={decimals} prefix={prefix} suffix={suffix} size={30} color={color} />
        {delta != null && progress > 0.45 && (
          <span style={{ fontSize: 13, fontWeight: 700, color: V.greenInk, display: 'inline-flex', alignItems: 'center', gap: 2,
            opacity: clamp((progress - 0.45) / 0.3, 0, 1) }}>
            <svg width="11" height="11" viewBox="0 0 12 12"><path d="M6 2l4 5H7v3H5V7H2z" fill={V.greenInk} /></svg>
            {delta}
          </span>
        )}
      </div>
    </div>
  );
}

// ── Ring / gauge (e.g. ROAS, engagement %) ──────────────────────────────────
function Ring({ progress, to = 100, size = 130, stroke = 12, color = V.green, label = '', suffix = '%', decimals = 0 }) {
  const e = Easing.easeOutCubic(clamp(progress, 0, 1));
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const frac = (to / 100) * e;
  return (
    <div style={{ position: 'relative', width: size, height: size, fontFamily: FONT }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={V.borderSoft} strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c * (1 - clamp(frac, 0, 1))} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <CountUp to={to} progress={progress} decimals={decimals} suffix={suffix} size={size * 0.24} color={V.ink2} />
        {label && <div style={{ fontSize: 11, fontWeight: 600, color: V.muted, marginTop: 2 }}>{label}</div>}
      </div>
    </div>
  );
}

Object.assign(window, { fmtNum, CountUp, LineChart, Bars, KPIStat, Ring });

  return (

          <span style={{ width: 7, height: 7, borderRadius: 7, background: V.green }} /> Auto-schedule on
        </span>
        <div style={{ marginLeft: 'auto', display: 'flex', border: `1px solid ${V.border}`, borderRadius: 9, overflow: 'hidden' }}>

          ))}
        </div>
      </div>
      {/* weekday header */}
      {days.map((d, i) => (
        <div key={d} style={{ position: 'absolute', left: gridX + i * colW + 8, top: gridTop - 26,
          fontFamily: MONO, fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', color: V.faint }}>{d}</div>
      ))}
      {/* grid */}
      <svg style={{ position: 'absolute', left: 0, top: 0, pointerEvents: 'none' }} width={1920} height={1080}>
        {[0, 1, 2, 3, 4, 5].map(r => <line key={'h' + r} x1={gridX} y1={gridTop + r * rowH} x2={gridX + 7 * colW} y2={gridTop + r * rowH} stroke={V.borderSoft} strokeWidth="1" />)}
        {[0, 1, 2, 3, 4, 5, 6, 7].map(c => <line key={'v' + c} x1={gridX + c * colW} y1={gridTop} x2={gridX + c * colW} y2={gridTop + 5 * rowH} stroke={V.borderSoft} strokeWidth="1" />)}
      </svg>
      {/* date numbers */}
      {dateNums.map((row, r) => row.map((dn, c) => dn && (
        <div key={r + '-' + c} style={{ position: 'absolute', left: gridX + c * colW + 9, top: gridTop + r * rowH + 7,
          fontFamily: FONT, fontSize: 12, fontWeight: 600, color: V.faint }}>{dn}</div>
      )))}
      {/* events flying into cells */}
      {events.map((ev, i) => {
        const lp = clamp((localTime - ev.d) / 0.55, 0, 1);
        if (lp <= 0) return <div key={i} />;
        const e = Easing.easeOutBack(lp);
        const tx = gridX + ev.col * colW + 6, ty = gridTop + ev.row * rowH + 26;
        const sx = gridX + 6, sy = gridTop + 5 * rowH - 30;
        const x = sx + (tx - sx) * e, y = sy + (ty - sy) * e;
        const c = (PLATFORMS[ev.plat] || { c: V.blue }).c;
        return (
          <div key={i} style={{ position: 'absolute', left: x, top: y, width: colW - 12,

            </div>
          </div>
        );
      })}
    </React.Fragment>
  );
}

        <circle cx={cx} cy={cy} r={R} fill="none" stroke={V.green} strokeWidth="3"
          pathLength="1" strokeDasharray="1" strokeDashoffset={1 - ringP}
          transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="round" opacity="0.6" />
        {/* spark */}
        <circle cx={spx} cy={spy} r="13" fill={V.green} opacity="0.22" />
        <circle cx={spx} cy={spy} r="6" fill={V.green} stroke="#fff" strokeWidth="2" />
      </svg>

      {/* nodes */}
      {nodes.map((nd, i) => {
        const a = nd.ang * Math.PI / 180;
        const nx = cx + Math.cos(a) * R, ny = cy + Math.sin(a) * R;
        const lp = clamp((localTime - 0.2 - i * 0.14) / 0.4, 0, 1);
        const e = Easing.easeOutBack(lp);
        return (
          <div key={i} style={{ position: 'absolute', left: nx, top: ny, transform: `translate(-50%,-50%) scale(${e})`, opacity: lp }}>
            <div style={{ background: '#fff', border: `1px solid ${V.border}`, borderRadius: 14, padding: '12px 18px',
              boxShadow: '0 12px 30px -10px rgba(0,0,0,0.5)', fontFamily: FONT, textAlign: 'center', minWidth: 116 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7 }}>
                <span style={{ width: 8, height: 8, borderRadius: 8, background: nd.c }} />
                <span style={{ fontSize: 16, fontWeight: 800, color: V.ink2, letterSpacing: '-0.01em' }}>{nd.label}</span>
              </div>
              <div style={{ fontSize: 11.5, color: V.muted, marginTop: 3 }}>{nd.sub}</div>
            </div>
          </div>
        );
      })}

      {/* center delta */}
      <div style={{ position: 'absolute', left: cx, top: cy, transform: 'translate(-50%,-50%)', textAlign: 'center',
        opacity: clamp((localTime - 0.5) / 0.4, 0, 1) }}>
        <div style={{ fontFamily: FONT, fontWeight: 800, fontSize: 52, color: V.green, letterSpacing: '-0.03em',
          display: 'flex', alignItems: 'center', gap: 6 }}>
          <svg width="30" height="30" viewBox="0 0 12 12"><path d="M6 2l4 5H7v3H5V7H2z" fill={V.green} /></svg>
          <CountUp to={41} progress={clamp((localTime - 0.5) / 1.0, 0, 1)} suffix="%" size={52} color={V.green} weight={800} />
        </div>
        <div style={{ fontFamily: FONT, fontSize: 14, fontWeight: 600, color: 'rgba(255,255,255,0.7)', marginTop: 2 }}>reach, every cycle</div>
      </div>
    </div>
  );
}

// ════════════════════════════ SCENE 6 — END CARD ═══════════════════════════
function SceneEnd() {
  const { localTime, duration } = useSprite();
  const t = useTime();
  const inP = Easing.easeOutBack(clamp(localTime / 0.6, 0, 1));
  const words = ['Create.', 'Post.', 'Perform.'];
  const pulse = 1 + Math.sin(t * 2) * 0.015;
  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 0 }}>
      {/* lockup */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 22, transform: `scale(${(0.85 + 0.15 * inP) * pulse})`, opacity: clamp(localTime / 0.4, 0, 1) }}>
        <BrandMark size={92} glow />
        <span style={{ fontFamily: FONT, fontSize: 84, fontWeight: 800, letterSpacing: '-0.04em', color: '#fff' }}>Vyrexads</span>
      </div>

      {/* tagline */}
      <div style={{ display: 'flex', gap: 22, marginTop: 38 }}>
        {words.map((w, i) => {
          const lp = clamp((localTime - 0.45 - i * 0.16) / 0.4, 0, 1);
          const e = Easing.easeOutBack(lp);
          const col = [V.blue, V.violet, V.green][i];
          return (
            <span key={i} style={{ fontFamily: FONT, fontSize: 44, fontWeight: 800, letterSpacing: '-0.03em',
              color: col, opacity: lp, transform: `translateY(${(1 - e) * 20}px) scale(${0.9 + 0.1 * e})`, display: 'inline-block' }}>{w}</span>
          );
        })}
      </div>

      {/* CTA */}
      <div style={{ marginTop: 46, opacity: clamp((localTime - 1.0) / 0.4, 0, 1),
        transform: `translateY(${(1 - clamp((localTime - 1.0) / 0.4, 0, 1)) * 16}px)` }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, padding: '16px 30px', borderRadius: 999,
          background: '#fff', fontFamily: FONT, fontSize: 23, fontWeight: 700, color: '#111',
          boxShadow: `0 0 40px ${V.blue}33, 0 16px 40px -12px rgba(0,0,0,0.6)` }}>
          vyrexads.com
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 30, height: 30, borderRadius: 999, background: '#111' }}>
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7h7M7 3l4 4-4 4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none" /></svg>
          </span>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { AnalyticsPanel, SceneAnalytics, SceneImprove, SceneEnd });

  <script type="text/babel" data-presets="env,react">
// scenes_c.jsx — transition scene: scattered data swirls + collapses into the logo.
// Loaded after scenes_b.jsx, before app.jsx.

// ── small scattered data widgets ────────────────────────────────────────────
function MiniWidget({ type, data }) {
  const wrap = (w, h, children) => (
    <div style={{ width: w, height: h, background: '#fff', border: `1px solid ${V.border}`, borderRadius: 11,
      boxShadow: '0 12px 28px -12px rgba(0,0,0,0.45)', fontFamily: FONT, overflow: 'hidden', padding: 12, boxSizing: 'border-box' }}>{children}</div>
  );
  if (type === 'stat') {
    return wrap(168, 92, (
      <React.Fragment>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', color: V.faint, textTransform: 'uppercase' }}>{data.label}</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 8 }}>
          <span style={{ fontSize: 26, fontWeight: 800, color: V.ink2, letterSpacing: '-0.02em' }}>{data.value}</span>
          {data.delta && <span style={{ fontSize: 12, fontWeight: 700, color: V.greenInk }}>{data.delta}</span>}
        </div>
        <div style={{ marginTop: 8, height: 4, borderRadius: 4, background: V.borderSoft }}>
          <div style={{ width: data.bar || '64%', height: '100%', borderRadius: 4, background: data.c || V.blue }} />
        </div>
      </React.Fragment>
    ));
  }
  if (type === 'line') {
    const pts = data.pts || [14, 20, 16, 26, 22, 32, 28, 40];
    const w = 176, h = 92, pad = 12;
    const min = Math.min(...pts), max = Math.max(...pts);
    const xs = pts.map((p, i) => pad + (i / (pts.length - 1)) * (w - pad * 2));
    const ys = pts.map(v => h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2 - 10));
    let d = `M ${xs[0]} ${ys[0]}`;
    for (let i = 1; i < pts.length; i++) { const cx = (xs[i - 1] + xs[i]) / 2; d += ` C ${cx} ${ys[i - 1]} ${cx} ${ys[i]} ${xs[i]} ${ys[i]}`; }
    return wrap(w, h, (
      <svg width={w - 24} height={h - 24} viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
        <path d={`${d} L ${xs[xs.length - 1]} ${h - pad} L ${xs[0]} ${h - pad} Z`} fill={`${data.c || V.green}22`} />
        <path d={d} fill="none" stroke={data.c || V.green} strokeWidth="2.5" strokeLinecap="round" />
        <circle cx={xs[xs.length - 1]} cy={ys[ys.length - 1]} r="3.5" fill={data.c || V.green} />
      </svg>
    ));
  }
  if (type === 'bars') {
    const vals = data.vals || [30, 50, 38, 64, 56, 80];
    const w = 152, h = 92, pad = 12, gap = 7;
    const max = Math.max(...vals), bw = (w - pad * 2 - gap * (vals.length - 1)) / vals.length;
    return wrap(w, h, (
      <svg width={w - 24} height={h - 24} viewBox={`0 0 ${w} ${h}`}>
        {vals.map((v, i) => { const bh = (v / max) * (h - pad * 2); const last = i === vals.length - 1;
          return <rect key={i} x={pad + i * (bw + gap)} y={h - pad - bh} width={bw} height={bh} rx="3" fill={last ? (data.c || V.blue) : V.faint2} opacity={last ? 1 : 0.5} />; })}
      </svg>
    ));
  }
  if (type === 'donut') {
    const v = data.value || 72, size = 80, stroke = 11, r = (size - stroke) / 2, c = 2 * Math.PI * r;
    return wrap(150, 92, (
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ position: 'relative', width: size, height: size }}>
          <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
            <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={V.borderSoft} strokeWidth={stroke} />
            <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={data.c || V.green} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - v / 100)} />
          </svg>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, fontWeight: 800, color: V.ink2 }}>{v}%</div>
        </div>
        <div style={{ fontSize: 11, color: V.muted, fontWeight: 600 }}>{data.label || 'rate'}</div>
      </div>
    ));
  }
  if (type === 'badge') {
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#fff', border: `1px solid ${V.border}`,
        borderRadius: 999, padding: '10px 16px', boxShadow: '0 10px 24px -10px rgba(0,0,0,0.4)', fontFamily: FONT }}>
        <span style={{ width: 8, height: 8, borderRadius: 8, background: data.c || V.green }} />
        <span style={{ fontSize: 17, fontWeight: 800, color: data.c || V.greenInk, letterSpacing: '-0.01em' }}>{data.value}</span>
        {data.label && <span style={{ fontSize: 12, color: V.muted, fontWeight: 600 }}>{data.label}</span>}
      </div>
    );
  }
  return null;
}

// scattered layout (centers, in canvas coords). center of vortex = (960, 512)
const CONVERGE_ITEMS = [
  { x: 470, y: 300, rot: -8, type: 'stat', data: { label: 'Reach', value: '248K', delta: '+38%', c: V.blue, bar: '78%' } },
  { x: 720, y: 210, rot: 5, type: 'line', data: { c: V.green, pts: [12, 18, 15, 24, 20, 30, 26, 38] } },
  { x: 1010, y: 250, rot: -4, type: 'badge', data: { value: '1,284', label: 'conv.', c: V.ink2 } },
  { x: 1240, y: 232, rot: 7, type: 'bars', data: { c: V.blue } },
  { x: 1470, y: 320, rot: -6, type: 'donut', data: { value: 92, label: 'on-target', c: V.green } },
  { x: 1540, y: 560, rot: 9, type: 'stat', data: { label: 'ROAS', value: '4.6x', delta: '+0.9', c: V.green, bar: '70%' } },
  { x: 1330, y: 690, rot: -7, type: 'badge', data: { value: '+41%', label: 'reach', c: V.greenInk } },
  { x: 1080, y: 730, rot: 6, type: 'line', data: { c: V.violet, pts: [20, 26, 22, 18, 24, 30, 28, 36] } },
  { x: 800, y: 770, rot: -5, type: 'stat', data: { label: 'CTR', value: '7.9%', delta: '+22%', c: V.violet, bar: '52%' } },
  { x: 520, y: 690, rot: 8, type: 'bars', data: { c: V.green, vals: [24, 44, 34, 58, 50, 72] } },
  { x: 410, y: 480, rot: -9, type: 'donut', data: { value: 64, label: 'engaged', c: V.blue } },
  { x: 700, y: 470, rot: 4, type: 'badge', data: { value: '€1.03', label: 'CPA', c: V.ink2 } },
  { x: 1240, y: 470, rot: -3, type: 'line', data: { c: V.green, pts: [16, 14, 20, 18, 26, 24, 34, 40] } },
  { x: 980, y: 470, rot: 6, type: 'stat', data: { label: 'Engagement', value: '7.9%', delta: '+22%', c: V.green, bar: '66%' } },
];

function SceneConverge() {
  const { localTime, duration } = useSprite();
  const t = useTime();
  const CX = 960, CY = 512;

  // phases
  const appear = clamp(localTime / 0.45, 0, 1);              // chips pop in
  const converge = Easing.easeInCubic(clamp((localTime - 1.5) / 1.15, 0, 1)); // swirl to center
  const logoP = Easing.easeOutBack(clamp((localTime - 2.0) / 0.85, 0, 1));    // mark grows
  const sceneIn = clamp(localTime / 0.3, 0, 1);

  return (
    <div style={{ position: 'absolute', inset: 0, opacity: sceneIn }}>
      {/* faint connecting web while it's busy */}
      <svg style={{ position: 'absolute', left: 0, top: 0, pointerEvents: 'none' }} width={1920} height={1080}>
        {CONVERGE_ITEMS.map((it, i) => {
          const a = Math.atan2(it.y - CY, it.x - CX), r0 = Math.hypot(it.x - CX, it.y - CY);
          const r = r0 * (1 - converge), ang = a + converge * 2.4;
          const x = CX + Math.cos(ang) * r, y = CY + Math.sin(ang) * r;
          return <line key={i} x1={CX} y1={CY} x2={x} y2={y} stroke="rgba(255,255,255,0.08)" strokeWidth="1"
            opacity={(1 - converge) * 0.7 * appear} />;
        })}
      </svg>

      {/* scattered widgets swirling into center */}
      {CONVERGE_ITEMS.map((it, i) => {
        const a = Math.atan2(it.y - CY, it.x - CX), r0 = Math.hypot(it.x - CX, it.y - CY);
        const r = r0 * (1 - converge), ang = a + converge * 2.4;
        const x = CX + Math.cos(ang) * r, y = CY + Math.sin(ang) * r;
        const pop = Easing.easeOutBack(clamp((appear - i * 0.015) / (1 - 0.2), 0, 1));
        const jit = (1 - converge) * Math.sin(t * 3 + i) * 3;
        const scale = (0.6 + 0.4 * pop) * (1 - 0.78 * converge);
        const op = appear * (1 - clamp((converge - 0.55) / 0.4, 0, 1));
        return (
          <div key={i} style={{ position: 'absolute', left: x + jit, top: y, transform: `translate(-50%,-50%) rotate(${it.rot * (1 - converge) + converge * 180}deg) scale(${scale})`,
            opacity: op, transformOrigin: 'center', willChange: 'transform, opacity' }}>
            <MiniWidget type={it.type} data={it.data} />
          </div>
        );
      })}

      {/* central glow as things collapse */}
      <div style={{ position: 'absolute', left: CX, top: CY,
        width: 620, height: 620, borderRadius: 999, pointerEvents: 'none',
        background: `radial-gradient(circle, ${V.blue}40, ${V.violet}1f 40%, transparent 66%)`,
        opacity: clamp((converge - 0.3) / 0.5, 0, 1) * (1 - clamp((localTime - duration + 0.4) / 0.4, 0, 1)),
        transform: `translate(-50%,-50%) scale(${0.5 + converge})` }} />

      {/* swirl ring forming */}
      <svg style={{ position: 'absolute', left: 0, top: 0, pointerEvents: 'none' }} width={1920} height={1080}>
        <circle cx={CX} cy={CY} r={70 + (1 - logoP) * 40} fill="none" stroke={V.blue} strokeWidth="2.5"
          strokeDasharray="3 10" strokeLinecap="round" opacity={clamp((converge - 0.4) / 0.4, 0, 1) * 0.6}
          transform={`rotate(${t * 120} ${CX} ${CY})`} />
      </svg>

      {/* the logo forms at the vortex center */}
      <div style={{ position: 'absolute', left: CX, top: CY, transform: `translate(-50%,-50%) scale(${0.2 + 0.8 * logoP})`,
        opacity: clamp((localTime - 2.0) / 0.4, 0, 1) }}>
        <BrandMark size={104} glow />
      </div>
    </div>
  );
}

Object.assign(window, { MiniWidget, SceneConverge });

  <script type="text/babel" data-presets="env,react">
// app.jsx — composes the Vyrexads ad timeline. Loaded last.

const DUR = 25.0;

// background whose accent glow shifts color per phase
function AdBackground() {
  const t = useTime();
  const { a, b } = colorPhase(t, [
    { t: 0, a: V.red, b: V.amber },
    { t: 4.2, a: V.violet, b: V.blue },
    { t: 9, a: V.blue, b: V.green },
    { t: 13.2, a: V.green, b: V.blue },
    { t: 17.4, a: V.green, b: V.green },
    { t: 19.4, a: V.blue, b: V.violet },
    { t: DUR, a: V.blue, b: V.violet },
  ]);
  return <GlowBg accent={a} accent2={b} />;
}

// sets data-screen-label = timecode each second (for review comments)
function TimecodeTag() {
  const t = useTime();
  const sec = Math.floor(t);
  React.useEffect(() => {
    const el = document.getElementById('ad-root');
    if (el) {
      const mm = String(Math.floor(sec / 60)).padStart(2, '0');
      const ss = String(sec % 60).padStart(2, '0');
      el.setAttribute('data-screen-label', `${mm}:${ss}`);
    }
  }, [sec]);
  return null;
}

// persistent corner brand (fades out on end card)
function CornerBrand() {
  const t = useTime();
  const op = t < 19.0 ? clamp((t - 0.2) / 0.5, 0, 1) : clamp(1 - (t - 19.0) / 0.4, 0, 1);
  return (
    <div style={{ position: 'absolute', left: 60, top: 56, opacity: op * 0.92, display: 'flex', alignItems: 'center', gap: 11 }}>
      <BrandMark size={32} />
      <span style={{ fontFamily: FONT, fontSize: 21, fontWeight: 800, letterSpacing: '-0.03em', color: '#fff' }}>Vyrexads</span>
    </div>
  );
}

// progress dots (one per scene)
function ProgressDots() {
  const t = useTime();
  const op = t < 19.0 ? clamp((t - 0.4) / 0.5, 0, 1) : clamp(1 - (t - 19.0) / 0.4, 0, 1);
  const bounds = [[0, 4.3], [4.15, 9.0], [8.9, 13.3], [13.2, 17.5], [17.4, 19.5]];
  const active = bounds.findIndex(([s, e]) => t >= s && t < e);
  return (
    <div style={{ position: 'absolute', left: '50%', bottom: 46, transform: 'translateX(-50%)', display: 'flex', gap: 9, opacity: op }}>
      {bounds.map((_, i) => (
        <div key={i} style={{ width: i === active ? 26 : 7, height: 7, borderRadius: 7,
          background: i === active ? '#fff' : 'rgba(255,255,255,0.28)', transition: 'width 0.3s' }} />
      ))}
    </div>
  );
}

function Ad() {
  return (
    <div id="ad-root" data-screen-label="00:00" style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      <AdBackground />
      <TimecodeTag />

      <Sprite start={0} end={4.3}><SceneProblem /></Sprite>
      <Sprite start={4.15} end={9.0}><SceneAICreate /></Sprite>
      <Sprite start={8.9} end={13.3}><SceneSchedule /></Sprite>
      <Sprite start={13.2} end={17.5}><SceneAnalytics /></Sprite>
      <Sprite start={17.4} end={19.5}><SceneImprove /></Sprite>
      <Sprite start={19.4} end={22.7}><SceneConverge /></Sprite>
      <Sprite start={22.55} end={DUR + 0.5}><SceneEnd /></Sprite>

      <CornerBrand />
      <ProgressDots />
    </div>
  );
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={DUR} background="#0A0B0D" persistKey="vyrexads-ad">
      <Ad />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
